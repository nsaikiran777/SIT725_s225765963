<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiplication Calculator</title>
</head>
<h1>Multiplication Calculator</h1>
  <form action="/multiply" method="GET">
    <div>
      <label for="a">Number 1:</label>
      <input type="text" id="a" name="a" required>
    </div>
    <div>
      <label for="b">Number 2:</label>
      <input type="text" id="b" name="b" required>
    </div>
    <button type="submit">Calculate Product</button>
  </form>
</body>
</html>
