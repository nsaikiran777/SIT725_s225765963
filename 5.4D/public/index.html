<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Catalogue</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Books Catalogue developed by s225765963</h1>

    <button onclick="getBooks()">Get all books</button>

    <h2>Add Book</h2>
    <form id="bookForm">
      <input type="text" id="id" placeholder="Book ID" required />
      <input type="text" id="title" placeholder="Title" required />
      <input type="text" id="author" placeholder="Author" required />
      <input type="number" id="year" placeholder="Year" required />
      <input type="text" id="genre" placeholder="Genre" required />
      <textarea id="summary" placeholder="Summary" required></textarea>
      <input type="number" step="0.01" id="price" placeholder="Price in AUD" required />
      <button type="submit">Add Book</button>
    </form>

    <p id="message"></p>
    <div id="booksContainer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
