<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Library App</title>

  <!-- Materialize CSS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="blue darken-2">
    <div class="nav-wrapper container">
      <a href="#" class="brand-logo">Books Library</a>
    </div>
  </nav>

  <div class="container">
    <h3 class="center-align">My Book Collection</h3>
    <p class="center-align">
      This web application displays a list of books using Materialize cards.
      The data is fetched from an Express REST API endpoint.
    </p>

    <div class="row" id="book-container"></div>
  </div>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
